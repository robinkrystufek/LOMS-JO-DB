<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../css/menu.css" />
    <link rel="stylesheet" href="../dist/css/boxicons.min.css" />
    <link rel="stylesheet" href="../dist/css/font-awesome.min.css" />
    <script src="../dist/firebase-app-compat.js"></script>
    <script src="../dist/firebase-auth-compat.js"></script>
    <script src="../js/auth_config.js"></script>
    <script src="../js/auth.js"></script>
    <title>JO Parameter Database API</title>
  </head>
  <body>
    <div class="navbar-wrapper">
      <nav style="position: absolute !important;">
        <div class="navbar">
          <i class="bx bx-menu"></i>
          <div class="logo"><a href="https://www.loms.cz/">LOMS</a></div>
          <div class="nav-links">
            <div class="sidebar-logo">
              <span class="logo-name">LOMS</span>
              <i class="fa fa-times"></i>
            </div>
            <ul class="links">
              <li>
                <li><a href="https://www.loms.cz/jo/">Judd–Ofelt analysis v1.0</a></li>
              </li>
              <li><a href="https://www.loms.cz/jo-database/">JO parameter database</a></li>
              <li>
                <a href="https://www.loms.cz/modules/judd-ofelt-analysis/">User guide</a>
                <i class="bx bxs-chevron-down js-arrow arrow"></i>
                <ul class="js-sub-menu sub-menu">
                  <li><a href="https://www.loms.cz/modules/judd-ofelt-analysis/">Module documentation</a></li>
                  <li><a href="https://www.loms.cz/FAQ/">FAQ</a></li>
                </ul>
              </li>
              <li>
                <a href="https://www.loms.cz/about/">About LOMS</a>
                <i class="bx bxs-chevron-down js-arrow arrow"></i>
                <ul class="js-sub-menu sub-menu">
                  <li><a href="https://www.loms.cz/privacy-policy/">Privacy policy</a></li>
                  <li><a href="https://www.loms.cz/about/#TC">Terms and conditions</a></li>
                  <li><a href="https://www.loms.cz/citation/">Citation</a></li>
                  <li><a href="mailto:info@loms.cz">Contact us</a></li>
                </ul>
              </li>
            </ul>
          </div>
          <div class="login-box">
            <li style="list-style-type: none"><span id="login-info-user" style="color: #fff;"></span><i class="bx bx-user" style="line-height: 20px;"></i></li>
            <div class="input-box">
              <div id="login-signup-area">
                <input style="display:block;width:auto;" type="text" id="email" name="email" placeholder="Email" />
                <br/>
                <input style="display:block;width:auto;" type="password" id="password" name="password" placeholder="Password" />
                <br/>
                <div id="userinfoextended" style="display:none;">
                  <input style="display:block;width:auto;" type="text" id="displayorcid" name="displayorcid" placeholder="ORCID" />
                  <br/>
                  <input style="display:block;width:auto;" type="text" id="displayname" name="displayname" placeholder="Name" />
                  <br/>
                  <input style="display:block;width:auto;" type="text" id="displayaffiliation" name="displayaffiliation" placeholder="Affiliation" />
                  <br/>
                  <div style="display:table-row;">
                    <span style="display:table-cell; vertical-align:middle;">
                      <input style="margin-left: -90px; margin-right: -110px;" type="checkbox" id="policyagreement" name="policyagreement" />
                    </span>
                    <label for="policyagreement" style="display:table-cell; width: 190px;">I agree to the <a href="https://www.loms.cz/privacy-policy/" style="color:#fff;">privacy policy</a>.</label>
                  </div>
                  <br/>
                </div>
                <div style="margin-left:33px;">
                  <button disabled class="login-box-button" id="login-widget-sign-in" name="signin" style="margin-bottom:10px;">Sign In</button>
                  &nbsp;&nbsp;&nbsp;
                  <button disabled class="login-box-button" id="login-widget-sign-up" name="signup" style="margin-bottom:10px;">Sign Up</button>
                  <br/>
                  <span id="login-notice"></span>
                  <a href="#" id="login-widget-password-reset">Reset password</a>
                </div>
              </div>
              <div id="loggedin-area" style="margin-left:33px; display: none; color: #fff;">
                <span id="loggedin-area-name" style="font-weight: bold;"></span>
                <br/><br/>
                <span id="loggedin-area-email"></span>
                <br/><br/>
                <span id="loggedin-area-affiliation" style="font-style: italic;"></span>
                <br/><br/>
                <span id="loggedin-area-orcid"></span>
                <br/><br/>
                <button class="login-box-button" id="login-widget-sign-out" name="signout" style="margin-bottom:10px;">Sign Out</button>&nbsp;&nbsp;&nbsp;
                <button class="login-box-button" id="login-widget-change-profile" name="change-profile" style="margin-bottom:10px;">Edit profile</button>
              </div>
              <div id="loggedin-area-edit" style=" display: none; color: #fff;">
                <input style="display:block;width:auto;" type="text" id="displayorcidedit" name="displayorcidedit" placeholder="ORCID" />
                <br/>
                <input style="display:block;width:auto;" type="text" id="displaynameedit" name="displaynameedit" placeholder="Name" />
                <br/>
                <input style="display:block;width:auto;" type="text" id="displayaffiliationedit" name="displayaffiliationedit" placeholder="Affiliation" />
                <br/>
                <button class="login-box-button" id="login-widget-change-profile-save" name="change-profile-save" style="margin-left:33px;margin-bottom:10px;">Save</button>&nbsp;&nbsp;&nbsp;
                <button class="login-box-button" id="login-widget-reset-pass2" name="reset-pass2" style="margin-bottom:10px;">Reset password</button><br/>
                <button class="login-box-button" id="login-widget-delete-account" name="delete-account" style="margin-left:33px;margin-bottom:10px;background-color:#dc3545;">Delete account</button>
              </div>
            </div>
          </div><i class="bx bx-printer" style="line-height: 20px;" onclick="window.print();"></i>
        </div>
      </nav>
    </div>
    <div id="app"></div>
    <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
    <script>
      Scalar.createApiReference('#app', {
        url: './openapi.yaml',
      })
    </script>
    <script src="../js/menu.js"></script>
    <script src="../js/auth.js"></script>
  </body>
</html>
